name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and test
        run: |
          xcodebuild \
            -project SatComTracker.xcodeproj \
            -scheme SatComTracker \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build
